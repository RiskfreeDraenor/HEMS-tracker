<script>
/* ---------- math + formatting helpers ---------- */
const NM_PER_KM=0.539957, KM_PER_NM=1.852, EARTH_R_KM=6371;
function distanceNm(lat1,lon1,lat2,lon2){const r=d=>d*Math.PI/180;const dLat=r(lat2-lat1),dLon=r(lon2-lon1);const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;return EARTH_R_KM*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*NM_PER_KM;}
function bearingDeg(lat1,lon1,lat2,lon2){const r=d=>d*Math.PI/180,g=v=>v*180/Math.PI;const φ1=r(lat1),φ2=r(lat2),λ1=r(lon1),λ2=r(lon2);const y=Math.sin(λ2-λ1)*Math.cos(φ2);const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(λ2-λ1);return (g(Math.atan2(y,x))+360)%360;}
function compassOctant(d){return ["N","NE","E","SE","S","SW","W","NW"][Math.round(d/45)%8];}
function fmtAltitude(a){if(a==="ground")return "GND";if(a==null||Number.isNaN(a))return "—";return `${Math.round(a).toLocaleString()} ft`;}
function fmtSpeed(s){if(s==null||Number.isNaN(s))return "—";return `${Math.round(s)} kt`;}
function fmtHeading(h){if(h==null||Number.isNaN(h))return "—";return `${Math.round(h).toString().padStart(3,"0")}°`;}
function fmtDistance(n){if(n==null)return "—";return n<10?`${n.toFixed(1)} nm`:`${n.toFixed(0)} nm`;}
function effectiveAltFt(a){if(a==="ground")return 0;if(typeof a==="number")return a;return null;}
function isOnGround(ac){return ac.alt_baro==="ground";}

/* ---------- adsb.lol API ---------- */
const Api=(()=>{
  const directBase = SETTINGS.apiBaseUrl;                                  // "https://api.adsb.lol/v2"
  const workerBase = (typeof WORKER_URL==="string" && WORKER_URL.trim())
    ? WORKER_URL.trim().replace(/\/+$/,"") + "/v2"
    : null;

  // Ordered list of strategies to try. First one that succeeds becomes sticky.
  const STRATEGIES = [
    ...(workerBase ? [{ name:"worker",     url: p => workerBase + p }] : []),
    { name:"direct",     url: p => directBase + p },
    { name:"allorigins", url: p => `https://api.allorigins.win/raw?url=${encodeURIComponent(directBase + p)}` },
  ];
  let activeIdx = 0;

  async function _fetchJson(url){
    const res = await fetch(url, { method:"GET", headers:{ Accept:"application/json" } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function _get(p){
    let lastErr;
    for (let i = activeIdx; i < STRATEGIES.length; i++){
      try {
        const json = await _fetchJson(STRATEGIES[i].url(p));
        if (i !== activeIdx){
          console.warn(`Switched API strategy to "${STRATEGIES[i].name}".`);
          activeIdx = i;
        }
        return json;
      } catch(e){ lastErr = e; }
    }
    const hint = workerBase
      ? " Check that the Worker URL is correct and the worker is deployed."
      : " Set up the Cloudflare Worker proxy — see SETUP-cloudflare.md.";
    throw new Error(`can't reach adsb.lol (${lastErr?.message||"unknown"}).${hint}`);
  }

  async function trafficNear(lat,lon,dN){const d=Math.max(1,Math.min(250,Math.round(dN)));const data=await _get(`/lat/${lat.toFixed(5)}/lon/${lon.toFixed(5)}/dist/${d}`);return data?.ac??[];}
  async function byRegistration(reg){const data=await _get(`/reg/${encodeURIComponent(reg.toUpperCase())}`);const list=data?.ac??[];return list[0]??null;}
  return {trafficNear,byRegistration};
})();

/* ---------- main app ---------- */
const state={radiusNm:SETTINGS.defaultRadiusNm,maxAltFt:SETTINGS.defaultMaxAltFt,fleet:{},traffic:[],fleetHexes:new Set(),trails:new Map(),lastUpdate:null,lastError:null,selectedHex:null,paused:false,
  sim:{enabled:false,primary:{lat:BASE_LOCATION.lat,lon:BASE_LOCATION.lon,alt:1500,heading:90,speed:100,autoFly:false},traffic:[]}};
const primary=FLEET.find(a=>a.isPrimary)??FLEET[0];
const SIM_PRIMARY_LABEL="123XX";
const ORIG_PRIMARY_LABEL=FLEET[0].label;

function projectLatLon(lat,lon,bearingDeg,distNm){
  const distRad=(distNm*KM_PER_NM)/EARTH_R_KM;
  const lat1=lat*Math.PI/180, lon1=lon*Math.PI/180, brng=bearingDeg*Math.PI/180;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(distRad)+Math.cos(lat1)*Math.sin(distRad)*Math.cos(brng));
  const lon2=lon1+Math.atan2(Math.sin(brng)*Math.sin(distRad)*Math.cos(lat1),Math.cos(distRad)-Math.sin(lat1)*Math.sin(lat2));
  return [lat2*180/Math.PI, lon2*180/Math.PI];
}

function regenerateSimTraffic(){
  const c=state.sim.primary;
  const presets=[
    {altDelta:200,  distNm:2, bearing:30,  type:"R44"},   // close in alt → shows altitude + clock
    {altDelta:-2000,distNm:4, bearing:120, type:"C172"},  // close in alt
    {altDelta:8000, distNm:6, bearing:210, type:"B738"},  // far in alt → no altitude shown
    {altDelta:-500, distNm:3, bearing:300, type:"BE20"},  // close in alt
  ];
  state.sim.traffic=presets.map((p,i)=>{
    const [lat,lon]=projectLatLon(c.lat,c.lon,p.bearing,p.distNm);
    return {
      hex:`SIMT000${i}`, callsign:`SIM${101+i}`,
      lat, lon,
      alt:Math.max(500,c.alt+p.altDelta),
      heading:(p.bearing+180)%360,
      speed:80+i*30, type:p.type,
    };
  });
}

function setSimMode(on){
  state.sim.enabled=on;
  FLEET[0].label=on?SIM_PRIMARY_LABEL:ORIG_PRIMARY_LABEL;
  state.trails.clear();
  if(on && state.sim.traffic.length===0) regenerateSimTraffic();
  tick();
}

function simTick(){
  const p=state.sim.primary;
  if(p.autoFly && p.speed>0){
    const dtSec=SETTINGS.refreshIntervalMs/1000;
    const distNm=p.speed*dtSec/3600;
    const [lat,lon]=projectLatLon(p.lat,p.lon,p.heading,distNm);
    p.lat=lat; p.lon=lon;
  }
  state.fleet={
    [primary.registration]:{
      hex:"SIM00001", r:SIM_PRIMARY_LABEL, flight:SIM_PRIMARY_LABEL,
      lat:p.lat, lon:p.lon, alt_baro:p.alt, gs:p.speed, track:p.heading,
      category:"A7", t:"B429", squawk:"1200",
    }
  };
  let pts=state.trails.get(primary.registration);
  if(!pts){pts=[]; state.trails.set(primary.registration,pts);}
  const last=pts[pts.length-1];
  if(!last || last[0]!==p.lat || last[1]!==p.lon){
    pts.push([p.lat,p.lon]);
    while(pts.length>SETTINGS.trailMaxPoints) pts.shift();
  }
  state.traffic=state.sim.traffic.map(t=>({
    hex:t.hex, r:t.callsign, flight:t.callsign,
    lat:t.lat, lon:t.lon, alt_baro:t.alt, gs:t.speed, track:t.heading,
    category:"A3", t:t.type, squawk:"1234",
  }));
  state.lastUpdate=Date.now();
  state.lastError=null;
}

const map=L.map("map",{zoomControl:false,attributionControl:true,worldCopyJump:true}).setView([BASE_LOCATION.lat,BASE_LOCATION.lon],11);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a> · data: <a href="https://adsb.lol">adsb.lol</a>',
  subdomains:"abcd",maxZoom:18}).addTo(map);

const trafficLayer=L.layerGroup().addTo(map);
const fleetLayer=L.layerGroup().addTo(map);
const ringsLayer=L.layerGroup().addTo(map);
const trailsLayer=L.layerGroup().addTo(map);
const markerByHex=new Map();

const HELI_SVG=`<svg viewBox="-12 -12 24 24" class="ac-svg"><line x1="-9" y1="-9" x2="9" y2="9" class="ac-rotor" stroke-width="1.2"/><line x1="9" y1="-9" x2="-9" y2="9" class="ac-rotor" stroke-width="1.2"/><rect x="-0.8" y="3" width="1.6" height="6" class="ac-body"/><rect x="-2.6" y="8.5" width="5.2" height="1" class="ac-body"/><rect x="-5" y="-1" width="2.5" height="2.5" class="ac-body"/><rect x="2.5" y="-1" width="2.5" height="2.5" class="ac-body"/><rect x="-2.6" y="-3" width="5.2" height="6" rx="1" class="ac-body"/><ellipse cx="0" cy="-4" rx="1.8" ry="2.5" class="ac-body"/></svg>`;
const PLANE_SVG=`<svg viewBox="-12 -12 24 24" class="ac-svg"><path d="M0,-10 L2.2,-4 L10,2 L10,4 L2,3 L1.5,8 L4,10 L4,11 L0,10 L-4,11 L-4,10 L-1.5,8 L-2,3 L-10,4 L-10,2 L-2.2,-4 Z" class="ac-body"/></svg>`;
const UNKNOWN_SVG=`<svg viewBox="-12 -12 24 24" class="ac-svg"><circle cx="0" cy="0" r="5" class="ac-body" fill="none" stroke-width="2"/></svg>`;

function buildIcon({ac,fleetCfg,isNear,primaryAc,isBase}){
  const isHeli=fleetCfg?.kind==="helicopter"||(fleetCfg?.kind==="auto"&&ac.category==="A7")||(!fleetCfg&&ac.category==="A7");
  const svg=fleetCfg?(isHeli?HELI_SVG:PLANE_SVG):ac.category==="A7"?HELI_SVG:ac.category&&ac.category.startsWith("A")?PLANE_SVG:UNKNOWN_SVG;
  const classes=["ac-marker"];
  if(fleetCfg)classes.push("ac-fleet");
  if(isNear)classes.push("ac-near");
  if(isOnGround(ac))classes.push("ac-ground");
  if(isBase)classes.push("ac-base");
  const track=Number.isFinite(ac.track)?ac.track:0;
  const colorVar=isBase?"--ac-color: var(--c-dim);":fleetCfg?`--ac-color: ${fleetCfg.color};`:isNear?"--ac-color: var(--c-warn);":"--ac-color: var(--c-traffic);";
  const label=fleetCfg?fleetCfg.label:(ac.flight?.trim()||ac.r||ac.hex||"");
  const line1Parts=[];
  const line2Parts=[];
  if(!fleetCfg&&primaryAc&&primaryAc.hex!==ac.hex&&Number.isFinite(ac.lat)&&Number.isFinite(ac.lon)){
    const pAlt=effectiveAltFt(primaryAc.alt_baro),tAlt=effectiveAltFt(ac.alt_baro);
    if(pAlt!=null&&tAlt!=null&&Math.abs(pAlt-tAlt)<=SETTINGS.nearbyAltDisplayFt){
      line1Parts.push(fmtAltitude(ac.alt_baro));
    }
    if(Number.isFinite(primaryAc.lat)&&Number.isFinite(primaryAc.lon)){
      line1Parts.push(fmtDistance(distanceNm(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon)));
    }
    if(Number.isFinite(primaryAc.track)&&Number.isFinite(primaryAc.lat)&&Number.isFinite(primaryAc.lon)){
      const b=bearingDeg(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon);
      const rel=(b-primaryAc.track+360)%360;
      const clock=Math.round(rel/30)||12;
      line2Parts.push(`${clock} o'c`);
    }
  }
  const line1=line1Parts.length?`<div class="ac-meta" style="${colorVar}">${line1Parts.join(" - ")}</div>`:"";
  const line2=line2Parts.length?`<div class="ac-meta" style="${colorVar}">${line2Parts.join(" · ")}</div>`:"";
  const html=`<div class="ac-wrap" style="${colorVar} transform: rotate(${track}deg);">${svg}</div><div class="ac-label" style="${colorVar}">${label}</div>${line1}${line2}`;
  return L.divIcon({className:classes.join(" "),html,iconSize:[48,64],iconAnchor:[24,24]});
}

function popupHtml(ac,fleetCfg,primaryAc,isBase){
  if(isBase){
    return `<div class="pop"><div class="pop-title"><span class="pop-tag fleet">BASE</span> ${fleetCfg.label}</div>
      <div class="pop-row"><span>REG</span><b>${ac.r||"—"}</b></div>
      <div class="pop-row"><span>COMPANY</span><b>${fleetCfg.company||"—"}</b></div>
      <div class="pop-row"><span>STATUS</span><b>NOT AIRBORNE</b></div></div>`;
  }
  const alt=fmtAltitude(ac.alt_baro),spd=fmtSpeed(ac.gs),hdg=fmtHeading(ac.track),sq=ac.squawk??"—",type=ac.t||"—",flt=ac.flight?.trim()||"—",reg=ac.r||"—";
  let distLine="";
  if(primaryAc&&primaryAc.hex!==ac.hex){
    const d=distanceNm(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon);
    const b=bearingDeg(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon);
    distLine=`<div class="pop-row"><span>FROM ${primary.label}</span><b>${fmtDistance(d)} · ${Math.round(b)}° ${compassOctant(b)}</b></div>`;
  }
  const title=fleetCfg?`<span class="pop-tag fleet">FLEET</span> ${fleetCfg.label}`:(flt!=="—"?flt:reg);
  return `<div class="pop"><div class="pop-title">${title}</div>
    <div class="pop-row"><span>REG</span><b>${reg}</b></div>
    <div class="pop-row"><span>TYPE</span><b>${type}</b></div>
    <div class="pop-row"><span>ALT</span><b>${alt}</b></div>
    <div class="pop-row"><span>SPD</span><b>${spd}</b></div>
    <div class="pop-row"><span>HDG</span><b>${hdg}</b></div>
    <div class="pop-row"><span>SQK</span><b>${sq}</b></div>
    ${distLine}</div>`;
}

function render(){
  const primaryAc=state.fleet[primary.registration]||null;
  const focus=primaryAc?{lat:primaryAc.lat,lon:primaryAc.lon,fromShip:true}:{lat:BASE_LOCATION.lat,lon:BASE_LOCATION.lon,fromShip:false};

  ringsLayer.clearLayers();
  const ringStep=state.radiusNm/SETTINGS.rangeRingCount;
  for(let i=1;i<=SETTINGS.rangeRingCount;i++){
    const r_nm=ringStep*i, r_m=r_nm*KM_PER_NM*1000;
    L.circle([focus.lat,focus.lon],{radius:r_m,color:i===SETTINGS.rangeRingCount?"#3a4a6e":"#26334e",weight:1,dashArray:i===SETTINGS.rangeRingCount?null:"2,4",fill:false}).addTo(ringsLayer);
  }
  L.circleMarker([focus.lat,focus.lon],{radius:4,color:focus.fromShip?primary.color:"#5a6a8a",weight:2,fill:false}).addTo(ringsLayer);

  trailsLayer.clearLayers();
  for(const cfg of FLEET){
    const pts=state.trails.get(cfg.registration);
    if(pts&&pts.length>=2){
      L.polyline(pts,{color:cfg.color,weight:2,opacity:0.55,dashArray:"3,5"}).addTo(trailsLayer);
    }
  }

  state.fleetHexes=new Set();
  const fleetItems=[];
  for(const cfg of FLEET){
    const ac=state.fleet[cfg.registration];
    if(ac&&Number.isFinite(ac.lat)&&Number.isFinite(ac.lon)){
      state.fleetHexes.add(ac.hex);
      fleetItems.push({ac,fleetCfg:cfg,isBase:false,layer:fleetLayer});
    } else if(cfg.base&&Number.isFinite(cfg.base.lat)&&Number.isFinite(cfg.base.lon)){
      const baseAc={hex:`BASE_${cfg.registration}`,r:cfg.registration,flight:cfg.label,lat:cfg.base.lat,lon:cfg.base.lon,alt_baro:null,track:null,gs:null};
      fleetItems.push({ac:baseAc,fleetCfg:cfg,isBase:true,layer:fleetLayer});
    }
  }
  const trafficItems=state.traffic
    .filter(ac=>!state.fleetHexes.has(ac.hex))
    .filter(ac=>SETTINGS.includeGroundTraffic||!isOnGround(ac))
    .filter(ac=>{const a=effectiveAltFt(ac.alt_baro);return a==null||a<=state.maxAltFt;})
    .filter(ac=>Number.isFinite(ac.lat)&&Number.isFinite(ac.lon))
    .map(ac=>({ac,fleetCfg:null,layer:trafficLayer}));

  const allItems=[...fleetItems,...trafficItems];
  const seenHexes=new Set(allItems.map(i=>i.ac.hex));

  for(const item of allItems){
    const {ac,fleetCfg,isBase,layer}=item;
    const isNear=!isBase&&primaryAc&&ac.hex!==primaryAc.hex&&
      distanceNm(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon)<=SETTINGS.proximityHorizontalNm&&
      (()=>{const pAlt=effectiveAltFt(primaryAc.alt_baro),tAlt=effectiveAltFt(ac.alt_baro);if(pAlt==null||tAlt==null)return true;return Math.abs(pAlt-tAlt)<=SETTINGS.proximityVerticalFt;})();
    const icon=buildIcon({ac,fleetCfg,isNear,primaryAc,isBase});
    let m=markerByHex.get(ac.hex);
    if(m){m.setLatLng([ac.lat,ac.lon]);m.setIcon(icon);}
    else{m=L.marker([ac.lat,ac.lon],{icon,riseOnHover:true}).addTo(layer);m.on("click",()=>{state.selectedHex=ac.hex;});markerByHex.set(ac.hex,m);}
    m.bindPopup(popupHtml(ac,fleetCfg,primaryAc,isBase),{className:"ac-popup",closeButton:false,offset:[0,-8]});
    if(state.selectedHex===ac.hex&&!m.isPopupOpen())m.openPopup();
  }
  for(const [hex,m] of markerByHex){
    if(!seenHexes.has(hex)){m.remove();markerByHex.delete(hex);if(state.selectedHex===hex)state.selectedHex=null;}
  }

  if(focus.fromShip){
    const c=map.getCenter();
    const dNm=distanceNm(c.lat,c.lng,focus.lat,focus.lon);
    if(dNm>state.radiusNm*0.4)map.panTo([focus.lat,focus.lon],{animate:true,duration:0.8});
  }

  renderPanel(primaryAc,trafficItems);
}

function renderPanel(primaryAc,trafficItems){
  const byCompany=new Map();
  for(const cfg of FLEET){
    const co=cfg.company||"—";
    if(!byCompany.has(co))byCompany.set(co,[]);
    byCompany.get(co).push(cfg);
  }
  const sections=[];
  for(const [companyName,cfgs] of byCompany){
    const cards=cfgs.map(cfg=>{
      const ac=state.fleet[cfg.registration];
      if(!ac)return `<div class="fleet-card offline" data-reg="${cfg.registration}" style="--ac-color:${cfg.color}"><div class="fc-top"><span class="fc-dot"></span><span class="fc-label">${cfg.label}</span><span class="fc-status">OFFLINE</span></div><div class="fc-sub">Not Airborne · ${cfg.registration}</div></div>`;
      const onGnd=isOnGround(ac);
      return `<div class="fleet-card ${onGnd?"ground":"airborne"}" data-reg="${cfg.registration}" style="--ac-color:${cfg.color}"><div class="fc-top"><span class="fc-dot"></span><span class="fc-label">${cfg.label}</span><span class="fc-status">${onGnd?"ON GROUND":"AIRBORNE"}</span></div><div class="fc-grid"><div><span>ALT</span><b>${fmtAltitude(ac.alt_baro)}</b></div><div><span>SPD</span><b>${fmtSpeed(ac.gs)}</b></div><div><span>HDG</span><b>${fmtHeading(ac.track)}</b></div></div></div>`;
    }).join("");
    sections.push(`<div class="company-group"><div class="company-header">${companyName}</div>${cards}</div>`);
  }
  document.getElementById("fleet-panel").innerHTML=sections.join("");
  document.querySelectorAll("#fleet-panel .fleet-card").forEach(card=>{
    card.addEventListener("click",()=>{
      const reg=card.dataset.reg, cfg=FLEET.find(c=>c.registration===reg), ac=state.fleet[reg];
      if(ac&&Number.isFinite(ac.lat)&&Number.isFinite(ac.lon))map.setView([ac.lat,ac.lon],Math.max(map.getZoom(),12),{animate:true});
      else if(cfg&&cfg.base)map.setView([cfg.base.lat,cfg.base.lon],Math.max(map.getZoom(),12),{animate:true});
    });
  });

  let list=trafficItems.map(({ac})=>{
    const d=primaryAc?distanceNm(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon):distanceNm(BASE_LOCATION.lat,BASE_LOCATION.lon,ac.lat,ac.lon);
    const b=primaryAc?bearingDeg(primaryAc.lat,primaryAc.lon,ac.lat,ac.lon):bearingDeg(BASE_LOCATION.lat,BASE_LOCATION.lon,ac.lat,ac.lon);
    const isNear=primaryAc&&d<=SETTINGS.proximityHorizontalNm&&(()=>{const pAlt=effectiveAltFt(primaryAc.alt_baro),tAlt=effectiveAltFt(ac.alt_baro);if(pAlt==null||tAlt==null)return true;return Math.abs(pAlt-tAlt)<=SETTINGS.proximityVerticalFt;})();
    return {ac,d,b,isNear};
  });
  list.sort((a,b)=>a.d-b.d);

  const rows=list.map(({ac,d,b,isNear})=>{
    const call=ac.flight?.trim()||ac.r||ac.hex;
    return `<li class="traf-row ${isNear?"near":""}" data-hex="${ac.hex}"><div class="tr-main"><span class="tr-call">${call}</span><span class="tr-type">${ac.t||""}</span></div><div class="tr-sub"><span>${fmtAltitude(ac.alt_baro)}</span><span>${fmtSpeed(ac.gs)}</span><span>${fmtDistance(d)} ${compassOctant(b)}</span></div></li>`;
  }).join("");

  document.getElementById("traffic-count").textContent=list.length;
  document.getElementById("traffic-list").innerHTML=rows||`<li class="traf-empty">No traffic in radius</li>`;

  document.querySelectorAll(".traf-row").forEach(row=>{
    row.addEventListener("click",()=>{
      const hex=row.dataset.hex, m=markerByHex.get(hex);
      if(m){state.selectedHex=hex;map.setView(m.getLatLng(),Math.max(map.getZoom(),12),{animate:true});m.openPopup();}
    });
  });

  const ts=state.lastUpdate?new Date(state.lastUpdate).toLocaleTimeString("en-US",{hour12:false}):"—";
  document.getElementById("last-update").textContent=ts;
  document.getElementById("status-dot").className="status-dot "+(state.lastError?"err":"ok");
  document.getElementById("status-text").textContent=state.lastError?`ERR: ${state.lastError}`:"LIVE";
}

async function tick(){
  if(state.paused)return;
  if(state.sim.enabled){simTick();render();return;}
  try{
    const fleetResults=await Promise.all(FLEET.map(async cfg=>{
      try{return [cfg.registration,await Api.byRegistration(cfg.registration)];}
      catch(e){return [cfg.registration,null];}
    }));
    state.fleet=Object.fromEntries(fleetResults);
    for(const cfg of FLEET){
      const ac=state.fleet[cfg.registration];
      if(!ac||!Number.isFinite(ac.lat)||!Number.isFinite(ac.lon))continue;
      let pts=state.trails.get(cfg.registration);
      if(!pts){pts=[];state.trails.set(cfg.registration,pts);}
      const last=pts[pts.length-1];
      if(!last||last[0]!==ac.lat||last[1]!==ac.lon){
        pts.push([ac.lat,ac.lon]);
        while(pts.length>SETTINGS.trailMaxPoints)pts.shift();
      }
    }
    const primaryAc=state.fleet[primary.registration];
    const focus=primaryAc?{lat:primaryAc.lat,lon:primaryAc.lon}:{lat:BASE_LOCATION.lat,lon:BASE_LOCATION.lon};
    state.traffic=await Api.trafficNear(focus.lat,focus.lon,state.radiusNm);
    state.lastUpdate=Date.now();
    state.lastError=null;
  }catch(e){state.lastError=e.message||String(e);}
  render();
}

function initUI(){
  const slider=document.getElementById("radius-slider"), readout=document.getElementById("radius-readout");
  slider.min=SETTINGS.minRadiusNm; slider.max=SETTINGS.maxRadiusNm; slider.value=SETTINGS.defaultRadiusNm;
  readout.textContent=`${SETTINGS.defaultRadiusNm} nm`;
  slider.addEventListener("input",()=>{state.radiusNm=Number(slider.value);readout.textContent=`${state.radiusNm} nm`;render();tick();});
  const altSlider=document.getElementById("alt-slider"), altReadout=document.getElementById("alt-readout");
  altSlider.min=SETTINGS.minMaxAltFt; altSlider.max=SETTINGS.maxMaxAltFt; altSlider.step=500; altSlider.value=SETTINGS.defaultMaxAltFt;
  altReadout.textContent=`${SETTINGS.defaultMaxAltFt.toLocaleString()} ft`;
  altSlider.addEventListener("input",()=>{state.maxAltFt=Number(altSlider.value);altReadout.textContent=`${state.maxAltFt.toLocaleString()} ft`;render();});

  const simBtn=document.getElementById("sim-toggle-btn");
  simBtn.addEventListener("click",()=>{
    const next=!state.sim.enabled;
    setSimMode(next);
    simBtn.textContent=next?"ON":"OFF";
    simBtn.classList.toggle("paused",next);
    document.getElementById("sim-controls").style.display=next?"":"none";
  });
  function wireSimSlider(id,readoutId,fmt,setter){
    const s=document.getElementById(id), r=document.getElementById(readoutId);
    s.addEventListener("input",()=>{const v=Number(s.value);r.textContent=fmt(v);setter(v);if(state.sim.enabled)tick();});
  }
  wireSimSlider("sim-alt-slider","sim-alt-readout",v=>`${v.toLocaleString()} ft`,v=>{state.sim.primary.alt=v;});
  wireSimSlider("sim-hdg-slider","sim-hdg-readout",v=>`${v.toString().padStart(3,"0")}°`,v=>{state.sim.primary.heading=v;});
  wireSimSlider("sim-spd-slider","sim-spd-readout",v=>`${v} kt`,v=>{state.sim.primary.speed=v;});
  document.getElementById("sim-autofly-btn").addEventListener("click",e=>{
    state.sim.primary.autoFly=!state.sim.primary.autoFly;
    e.currentTarget.textContent=state.sim.primary.autoFly?"■ STOP":"▶ AUTO-FLY";
    e.currentTarget.classList.toggle("paused",state.sim.primary.autoFly);
  });
  document.getElementById("sim-place-btn").addEventListener("click",()=>{
    state.sim.primary.lat=BASE_LOCATION.lat;
    state.sim.primary.lon=BASE_LOCATION.lon;
    state.trails.delete(primary.registration);
    if(state.sim.enabled){regenerateSimTraffic();tick();}
  });
  document.getElementById("sim-traffic-btn").addEventListener("click",()=>{
    regenerateSimTraffic();
    if(state.sim.enabled)tick();
  });
  document.getElementById("recenter-btn").addEventListener("click",()=>{
    const ac=state.fleet[primary.registration];
    if(ac)map.setView([ac.lat,ac.lon],12,{animate:true});
    else map.setView([BASE_LOCATION.lat,BASE_LOCATION.lon],11,{animate:true});
  });
  document.getElementById("pause-btn").addEventListener("click",e=>{
    state.paused=!state.paused;
    e.currentTarget.textContent=state.paused?"▶ RESUME":"❚❚ PAUSE";
    e.currentTarget.classList.toggle("paused",state.paused);
    if(!state.paused)tick();
  });
  map.on("click",()=>{state.selectedHex=null;});
}

window.addEventListener("DOMContentLoaded",()=>{
  initUI();
  tick();
  setInterval(tick,SETTINGS.refreshIntervalMs);
});
</script>
</body>
</html>
